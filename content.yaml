site:
  title: Neuro2026 硬式テニス交流会【非公式】
  description: Neuro2026 硬式テニス交流会の案内ページ。日時・会場・参加申込はこちらから。
  brand: 神経科学テニス交流会【非公式】
  footer_title: Neuro2026 硬式テニス交流会【非公式】
  copyright: 神経科学テニス交流会 有志

hero:
  background: "images/Gemini_neuro2026_tennis.png"  # 例: images/hero-bg.jpg（空ならグラデーションのみ）
  kicker: Neuro2026【非公式】 懇親イベント
  title: 硬式テニス交流会
  subtitle: 学会の合間にコートで一汗。研究者どうし、ラケットを通じてつながろう。
  chips:
    - 📅 2026/07/30 (木) 19:00-22:00
    - 📍 会場は参加者にのみ連絡
    - 👥 初心者歓迎

about:
  paragraphs:
    - >-
      Neuro2026の参加者を対象とした、硬式テニスの交流会です。
      ニューロサイエンスの第一線で活躍する研究者・学生が、学会の枠を越えて
      スポーツを通じて親睦を深めることを目的としています。
    - >-
      オムニコートでの開催を予定していますので、なるべくオムニコート用のテニスシューズをお持ちください。
      ボールはこちらで用意しますが、ラケットはなるべくご自身のものをお持ちください。
      複数本持ってきているメンバーから借りることが出来る可能性はあります。
    - >-
      競技志向の方からブランクのある方、初心者まで、どなたでも楽しめる
      レクリエーション形式を予定しています。
  points:
    - icon: 🤝
      title: 研究者ネットワーキング
      text: 分野・所属を越えたつながりを。
    - icon: 🎾
      title: レベル不問
      text: 初心者から経験者まで歓迎。
    - icon: ☀️
      title: 気軽に参加
      text: 学会のリフレッシュに最適。
  organizer_main: 【神経科学テニス交流会 有志】
  organizer_co: 【Eichi Toyoizumi, Ayumu Yamashita】

access:
  date:
    headline: 2026/07/30 (木) 19:00-22:00
    detail: 学会後、公共交通機関で15分程度のコートで開催予定です。
  venue:
    headline: 会場は参加者にのみお伝えします
    detail: 参加が確定した方へ、個別に会場名・アクセス方法をご連絡します。
  transport:
    headline: アクセス
    detail: 会場の詳細と合わせて、参加者にのみご案内します。
  map:
    message: 会場情報は公開しておりません（参加者に個別連絡）
    hidden: true

schedule:
  timeline:
    - time: 【19:00】
      title: 集合・受付
      description: コートに集合。参加費のお支払い
    - time: 【19:10】
      title: ウォームアップ・乱打
      description: 準備運動と肩慣らし。
    - time: 【22:00】
      title: 解散
  note: ※ 形式・時間は参加人数により変更する場合があります。

fee:
  amount: 約2000円程度になる予定です
  amount_note: コート使用料・ボール代等を含む予定。当日現金またはpaypayで支払いを想定。
  bring_items:
    - テニスラケット（複数本持ってきているメンバーから借りることが出来る可能性はあります）
    - 運動できる服装・テニスシューズ
    - 飲み物・タオル・着替え

register:
  lead: 参加希望者は豊泉英智まで、以下のいずれかでご連絡ください。
  contact_name: 豊泉英智
  email: eichi.toyoizumi@riken.jp
  x_url: https://x.com/eichi_toyoizumi
  x_label: X（@eichi_toyoizumi）のDM
  required_fields:
    - フルネーム
    - 所属先
    - 職階
    - テニスの経験
  note: 上記4点を記載の上、メールまたはXのDMでお送りください。定員に達し次第締め切ります。

gallery:
  description: 昨年度（Neuro2025）の硬式テニス交流会の様子です。掲載写真はプライバシー保護のため顔にモザイクを入れています。
  images:
    - src: images/gallery-neuro2025.jpg
      alt: Neuro2025 硬式テニス交流会（集合写真）
